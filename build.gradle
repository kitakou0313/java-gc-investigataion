plugins {
    id 'java'
}

group = 'com.example.gc'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

// 依存クラスをすべて含む fat JAR を生成
jar {
    archiveFileName = 'gc-investigation.jar'
    manifest {
        attributes 'Main-Class': 'com.example.gc.GcInvestigation'
    }
}
